<body>

  <h1>◼ CPG PIPELINE</h1>
  <p class="sub">IMAGE → CUSTOM PIXEL CODE → EDGE DETECTION → BACKGROUND REMOVAL → 3D MESH</p>

  <!-- Controls -->

  <div class="controls">

```
<!-- File picker — clicking the styled button triggers the hidden input -->
<label>
  <span>IMAGE</span>
  <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
    ⬆ LOAD IMAGE
  </button>
  <input type="file" id="fileInput" accept="image/*" onchange="onFileChange(event)" />
</label>

<!-- Edge threshold: lower = more edges, higher = fewer, sharper edges only -->
<label>
  <span>EDGE THRESHOLD</span>
  <input type="number" id="edgeThresh" value="30" min="1" max="255" />
</label>

<!-- Background threshold: same idea but for the flood-fill wall sensitivity -->
<label>
  <span>BG THRESHOLD</span>
  <input type="number" id="bgThresh" value="30" min="1" max="255" />
</label>

<!-- zScale: how deep the 3D extrusion goes -->
<label>
  <span>Z SCALE (3D depth)</span>
  <input type="number" id="zScale" value="50" min="1" max="300" />
</label>

<!-- Run the whole pipeline once the image is loaded -->
<label>
  <span>&nbsp;</span>
  <button onclick="runAll()">▶ RUN PIPELINE</button>
</label>
```

  </div>

  <!-- Stage selector — choose which output to show in the textarea -->

  <div class="stage-btns">
    <button onclick="showStage('pixels')"     id="btn-pixels">PIXELS</button>
    <button onclick="showStage('edges')"      id="btn-edges">EDGES</button>
    <button onclick="showStage('foreground')" id="btn-foreground">FOREGROUND</button>
    <button onclick="showStage('mesh')"       id="btn-mesh">MESH (CPG)</button>
    <button onclick="showStage('obj')"        id="btn-obj">MESH (OBJ)</button>
  </div>

  <!-- Stats line -->

  <div class="stats" id="stats">No image loaded.</div>

  <!-- Preview canvas + code output -->

  <div class="output-area">
    <canvas id="preview" width="300" height="300"></canvas>
    <div style="flex:1; min-width:260px; display:flex; flex-direction:column;">
      <textarea id="codeOut" readonly placeholder="// Run the pipeline to see code output here..."></textarea>
      <div class="dl-row">
        <button onclick="copyCode()">⎘ COPY</button>
        <button onclick="downloadCurrent()">↓ DOWNLOAD</button>
      </div>
    </div>
  </div>

  <!--
    We import the compiled pipeline.
    After you run `npm run build`, Vite/tsc outputs dist/pipeline.js.
    Update the src path to match your build output if needed.
  -->

  <script type="module">
    // Import the pipeline function and download utility.
    // In a Vite project this path resolves automatically.
    import { runPipeline, downloadText } from "./src/pipeline.ts";

    let outputs  = {};        // holds all stage code strings
    let curStage = "pixels"; // which stage is currently shown
    let img      = null;     // the loaded HTMLImageElement

    // ── File input handler ──
    window.onFileChange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      img = new Image();
      img.onload = () => {
        // Draw a preview on the canvas immediately.
        const canvas = document.getElementById("preview");
        const ctx    = canvas.getContext("2d");
        canvas.width  = Math.min(img.naturalWidth, 300);
        canvas.height = Math.min(img.naturalHeight, 300);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        document.getElementById("stats").innerHTML =
          `<span>Image loaded: ${img.naturalWidth}×${img.naturalHeight}px</span>`;
      };
      img.src = URL.createObjectURL(file);
    };

    // ── Run the full pipeline ──
    window.runAll = () => {
      if (!img) { alert("Load an image first."); return; }

      const opts = {
        edgeThreshold:       parseInt(document.getElementById("edgeThresh").value),
        backgroundThreshold: parseInt(document.getElementById("bgThresh").value),
        zScale:              parseInt(document.getElementById("zScale").value),
      };

      // runPipeline does all the work — stages 1 through 4.
      const result = runPipeline(img, opts);
      outputs = result.outputs;

      // Update stats line.
      const s = result.state;
      const fg = s.pixels.filter(p => p.a > 0).length;
      document.getElementById("stats").innerHTML =
        `<span>${s.width}×${s.height}px</span>` +
        `<span>${s.pixels.length.toLocaleString()} pixels</span>` +
        `<span>${s.edges.length.toLocaleString()} edges</span>` +
        `<span>${fg.toLocaleString()} foreground</span>` +
        (s.mesh ? `<span>${s.mesh.triangles.length.toLocaleString()} triangles</span>` : "");

      // Show the current stage.
      showStage(curStage);
    };

    // ── Show a specific stage's output ──
    window.showStage = (stage) => {
      curStage = stage;
      document.getElementById("codeOut").value = outputs[stage] || "// Run the pipeline first.";

      // Highlight the active button.
      ["pixels","edges","foreground","mesh","obj"].forEach(s => {
        document.getElementById("btn-" + s).classList.toggle("active", s === stage);
      });
    };

    // ── Copy to clipboard ──
    window.copyCode = () => {
      navigator.clipboard.writeText(document.getElementById("codeOut").value);
    };

    // ── Download the current stage output ──
    window.downloadCurrent = () => {
      const ext = curStage === "obj" ? "obj" : "cpg";
      downloadText(outputs[curStage] || "", `cpg-${curStage}.${ext}`);
    };
  </script>

</body>
</html>
